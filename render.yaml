# Render.com blueprint - deploys the Evently API.
# Import this repo on Render, it auto-detects this file.
# Env vars marked `sync: false` must be filled in via the Render dashboard.
services:
  - type: web
    name: evently-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: AUTH_RATE_LIMIT_MAX
        value: 5
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
